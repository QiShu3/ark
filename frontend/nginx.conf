server {
  listen 80;
  server_name _;

  # Redirect domain root to /ark/
  location = / {
    return 302 /ark/;
  }

  # Ensure /ark redirects to /ark/
  location = /ark {
    return 308 /ark/;
  }

  # Serve SPA under /ark/
  location /ark/ {
    alias /usr/share/nginx/html/ark/;
    try_files $uri $uri/ /ark/index.html;
  }

  # Cache immutable assets
  location ~* ^/ark/assets/.*\.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    alias /usr/share/nginx/html/ark/assets/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
