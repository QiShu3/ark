name: Feature request
about: 为本项目提出一个新功能建议
title: '[FEAT] '
labels: enhancement
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        有一个很棒的想法？请告诉我们！
  - type: textarea
    id: problem
    attributes:
      label: 您的功能请求是否与某个问题有关？
      description: 清楚简洁地描述问题是什么。例如：当 [...] 时，我总是感到很沮丧。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 描述您想要的解决方案
      description: 清楚简洁地描述您希望发生的事情。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 描述您考虑过的替代方案
      description: 清楚简洁地描述您考虑过的任何替代解决方案或功能。
  - type: textarea
    id: additional_context
    attributes:
      label: 其他上下文
      description: 在此处添加有关功能请求的任何其他上下文或截图。
