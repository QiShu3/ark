name: Bug report
about: 创建一份报告以帮助我们改进
title: '[BUG] '
labels: bug
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        感谢您报告问题！请尽可能详细地填写以下内容。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚简洁地描述 Bug 是什么。
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 重现步骤
      description: 描述重现该问题的步骤。
      placeholder: |
        1. 启动项目...
        2. 点击...
        3. 看到错误...
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 预期行为
      description: 描述您期望发生的情况。
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果有，请添加截图以帮助解释您的问题。
  - type: input
    id: environment
    attributes:
      label: 环境信息
      description: 例如 OS: macOS, Browser: Chrome, Python: 3.11
