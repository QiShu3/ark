version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      python-major:
        update-types:
          - "major"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      frontend-major:
        update-types:
          - "major"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      actions-major:
        update-types:
          - "major"
        patterns:
          - "*"
