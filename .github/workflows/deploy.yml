name: Legacy Deploy to Cloud Server (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}  # 请确保 Secret 名称拼写正确
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            # 进入工作目录
            cd /home/ark

            # 拉取最新 main 分支代码
            git checkout main
            git pull origin main

            # 启动前端（开发模式，放入后台运行）
            cd /home/ark/frontend
            nohup pnpm run dev > frontend.log 2>&1 &

            # 启动后端（开发模式，放入后台运行）
            cd /home/ark/backend
            nohup uv run python -m uvicorn main:app --reload --host 0.0.0.0 --port 8000 > backend.log 2>&1 &

            echo "Deployment finished. Check frontend.log and backend.log for details."
