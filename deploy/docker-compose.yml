services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  api:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      PORT: "8000"
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    expose:
      - "8000"
    depends_on:
      - db

  web:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    expose:
      - "80"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ark}
      POSTGRES_USER: ${POSTGRES_USER:-ark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  caddy_data:
  caddy_config:
  pg_data:
